<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070A"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title{
        fill:#8BE9FD;
        font-family:Arial, Helvetica, sans-serif;
        font-weight:700;
        letter-spacing:8px;
      }

      .subtitle{
        fill:#00BFFF;
        font-family:Arial, Helvetica, sans-serif;
        letter-spacing:4px;
      }

      .small{
        fill:#88DFFF;
        font-family:Consolas, monospace;
      }

      .cursor{
        animation:blink 1s steps(2,start) infinite;
      }

      @keyframes blink{
        50%{opacity:0;}
      }
    </style>

  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>

  <!-- Border -->
  <rect
      x="20"
      y="20"
      width="1560"
      height="460"
      rx="12"
      fill="none"
      stroke="#00BFFF"
      stroke-width="2"/>

  <!-- Corner accents -->
  <line x1="20" y1="80" x2="120" y2="80" stroke="#00BFFF" stroke-width="3"/>
  <line x1="20" y1="80" x2="20" y2="180" stroke="#00BFFF" stroke-width="3"/>

  <line x1="1580" y1="80" x2="1480" y2="80" stroke="#00BFFF" stroke-width="3"/>
  <line x1="1580" y1="80" x2="1580" y2="180" stroke="#00BFFF" stroke-width="3"/>

  <line x1="20" y1="420" x2="120" y2="420" stroke="#00BFFF" stroke-width="3"/>
  <line x1="20" y1="420" x2="20" y2="320" stroke="#00BFFF" stroke-width="3"/>

  <line x1="1580" y1="420" x2="1480" y2="420" stroke="#00BFFF" stroke-width="3"/>
  <line x1="1580" y1="420" x2="1580" y2="320" stroke="#00BFFF" stroke-width="3"/>

  <!-- Title -->
  <text
      x="800"
      y="90"
      text-anchor="middle"
      class="small"
      font-size="26">
      WELCOME TO MY GITHUB
  </text>

  <!-- Name -->
  <text
      x="800"
      y="190"
      text-anchor="middle"
      class="title"
      font-size="70"
      filter="url(#glow)">
      JADEN KNOTTS
      <tspan class="cursor">_</tspan>
  </text>

  <!-- Subtitle -->
  <text
      x="800"
      y="250"
      text-anchor="middle"
      class="subtitle"
      font-size="34">
      CYBERSECURITY
  </text>

  <text
      x="800"
      y="305"
      text-anchor="middle"
      class="small"
      font-size="24">
      Learning • Building • Defending.
  </text>

  <!-- Divider -->
  <line x1="250" y1="340" x2="1350" y2="340"
        stroke="#00BFFF"
        opacity=".4"/>

  <!-- Status -->
  <text x="350" y="390" class="small" font-size="22">
      STATUS ........ ONLINE
  </text>

  <text x="650" y="390" class="small" font-size="22">
      PORTFOLIO ..... ACTIVE
  </text>

  <text x="1030" y="390" class="small" font-size="22">
      VERSION ....... v1.0
  </text>

  <text
      x="800"
      y="445"
      text-anchor="middle"
      class="subtitle"
      font-size="28">
      &gt; ACCESS GRANTED
      <tspan class="cursor">_</tspan>
  </text>

</svg>